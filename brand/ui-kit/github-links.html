<!--
  github-links.html — toolbar links to a project's GitHub repo + issues.
  Drop into your toolbar/header alongside theme-toggle.html.

  - GitHub's brand guidelines (brand.github.com/foundations/logo) permit the Octocat
    to LINK to a project but forbid recolouring it. So this displays GitHub's provided
    black/white marks directly — github-black.svg on light, github-white.svg on dark —
    swapped by the resolved theme (html[data-theme]; `system` -> prefers-color-scheme),
    never tinted to the EyeRest accent. (Same dark/light-pair pattern as the other
    monochrome icons, e.g. gh-models-dark/light.)
  - Vendor both SVGs into your own assets/ — a deployed site can't reference another
    repo at runtime — and point the background-image url()s at the local copies.
  - Replace OWNER/REPO with the project. The visible labels (Repo/Issues) carry the
    meaning, so the icon is aria-hidden (decorative).
  - rel="noopener noreferrer" hardens the external target.
  - The rules below are self-contained (the kit's CSS is generated from DESIGN.md); a
    host that already styles toolbar links can drop .gh-link and keep .gh-icon.

  Provenance: the mark path is Bootstrap Icons (MIT); the GitHub logo itself is a
  GitHub trademark, used here per brand.github.com only to link to the project.
-->
<style>
  .gh-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    text-decoration: none;
  }
  .gh-link .gh-icon {
    width: 14px;
    height: 14px;
    flex: 0 0 auto;
    background: center / contain no-repeat
      url("../../assets/images/icons/github-black.svg");
  }
  html[data-theme="dark"] .gh-link .gh-icon {
    background-image: url("../../assets/images/icons/github-white.svg");
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme]) .gh-link .gh-icon {
      background-image: url("../../assets/images/icons/github-white.svg");
    }
  }
</style>

<a
  class="gh-link"
  href="https://github.com/OWNER/REPO"
  target="_blank"
  rel="noopener noreferrer"
  aria-label="Repository on GitHub"
  title="Repository on GitHub"
>
  <span class="gh-icon" aria-hidden="true"></span>Repo
</a>
<a
  class="gh-link"
  href="https://github.com/OWNER/REPO/issues"
  target="_blank"
  rel="noopener noreferrer"
  aria-label="Issues on GitHub"
  title="Issues on GitHub"
>
  <span class="gh-icon" aria-hidden="true"></span>Issues
</a>
