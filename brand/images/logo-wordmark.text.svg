<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="qte77 wordmark">
  <style>
    .wm-fg { fill: #e6edf3; }
    .wm-accent { fill: #388bfd; }
    @media (prefers-color-scheme: light) {
      .wm-fg { fill: #1f2328; }
      .wm-accent { fill: #1f6feb; }
    }
  </style>
  <text class="wm-fg" x="20" y="54"
        font-family="DejaVu Sans Mono, Cascadia Mono, Cascadia Code, Consolas, ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="44" font-weight="700" letter-spacing="-1">qte77</text>
  <!-- Underscore tuned for DejaVu Sans Mono Bold at font-size 44, letter-spacing=-1:
       - Glyph advance: 1233/2048 em × 44 ≈ 26.49 viewBox units
       - q starts at x=20 (text element x); per-char gap is letter-spacing (-1)
       - t left edge: 45.49 (rect x)
       - Last 7 left edge: 121.96 → rect right edge
       - Width: 121.96 - 45.49 = 76.47
       - q glyph yMin = -426 → q ink bottom y = 54 + 426*44/2048 = 63.15
       - Rect bottom = q ink bottom → y = 63.15 - 3 = 60.15 -->
  <rect class="wm-accent" x="45.49" y="60.15" width="76.47" height="3" rx="1.5"/>
</svg>
