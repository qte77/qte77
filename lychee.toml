# Lychee link checker configuration
# https://lychee.cli.rs/usage/config/

# Accept status codes commonly returned by bot-blocking sites
accept = [200, 202, 204, 301, 400, 401, 403, 406, 415, 429, 500]

# Exclude paths from scanning
exclude_path = [
  ".venv",
  ".github/workflows",
  "brand/dist",
  "brand/fonts",
]

# Exclude URLs that are expected to fail in CI
exclude = [
  # --- Non-routable / local ---
  "^https?://localhost",
  "^https?://169\\.254\\.",

  # --- Profile pages not always indexed ---
  "^https?://qte77\\.github\\.io",

  # --- GitHub anchors / settings pages requiring auth ---
  "^https://github\\.com/.*/settings",
  "^https://github\\.com/.*/security/advisories/new",
]
