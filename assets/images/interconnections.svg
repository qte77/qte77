  <path d="M 490,93 C 560,110 620,130 660,145" fill="none" stroke="#a371f7" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- 7. coding-agents-research → multi-tasking-quality (feeds research) -->
