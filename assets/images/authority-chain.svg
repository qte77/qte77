<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 660" width="900" height="660">
  <defs>
    <style>
      .page-bg { fill: #ffffff; }
      .band-bg { fill: #f6f8fa; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; fill: #656d76; }
      .tier-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #57606a; letter-spacing: 1.5px; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #1f2328; }
      .box-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; fill: #656d76; }
      .box-note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; fill: #8b949e; }
      .note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; fill: #8b949e; }
      .arrow { stroke: #b0b8c1; stroke-width: 1.4; fill: none; marker-end: url(#ah-l); }

      a:hover .box { stroke: #1f2328; stroke-width: 1.5; }

      @media (prefers-color-scheme: dark) {
        .page-bg { fill: #0d1117; }
        .band-bg { fill: #161b22; }
        .box { fill: #0d1117; stroke: #30363d; }
        .title { fill: #e6edf3; }
        .subtitle { fill: #8b949e; }
        .tier-label { fill: #8b949e; }
        .box-title { fill: #e6edf3; }
        .box-desc { fill: #8b949e; }
        .box-note { fill: #484f58; }
        .note { fill: #484f58; }
        .arrow { stroke: #484f58; marker-end: url(#ah-d); }
        a:hover .box { stroke: #e6edf3; }
      }
    </style>
    <marker id="ah-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#b0b8c1" stroke-width="1"/>
    </marker>
    <marker id="ah-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#484f58" stroke-width="1"/>
    </marker>
  </defs>

  <rect class="page-bg" width="900" height="660" rx="8"/>

  <!-- Title + subtitle -->
  <text class="title" x="450" y="22" text-anchor="middle">qte77 — Authority Chain</text>
  <text class="subtitle" x="450" y="38" text-anchor="middle">Where each decision lives  ·  one source of truth per tier  ·  DRY across the workspace</text>

  <!-- ===== Band 1: META · POLICY · HUMANS DECIDE (qte77) ===== -->
  <rect class="band-bg" x="10" y="54" width="880" height="92" rx="6"/>
  <text class="tier-label" x="20" y="69">META  ·  POLICY  ·  HUMANS DECIDE</text>

  <a xlink:href="https://github.com/qte77/qte77">
    <title>qte77/qte77 — workspace meta: AGENTS.md, project-workflows.md, cross-repo hygiene policy. Humans are the policy authority; this repo records their decisions.</title>
    <rect class="box" x="260" y="78" width="380" height="58" rx="5"/>
    <text class="box-title" x="450" y="97" text-anchor="middle">qte77/qte77</text>
    <text class="box-desc" x="450" y="113" text-anchor="middle">workspace meta  ·  AGENTS.md  ·  project-workflows.md</text>
    <text class="box-note" x="450" y="127" text-anchor="middle">humans set policy  ·  this repo records it  ·  no mechanism</text>
  </a>

  <!-- Arrow META → KERNEL -->
  <line class="arrow" x1="450" y1="146" x2="450" y2="170"/>

  <!-- ===== Band 2: KERNEL · PACKAGES (claude-code-plugins) ===== -->
  <rect class="band-bg" x="10" y="172" width="880" height="92" rx="6"/>
  <text class="tier-label" x="20" y="187">KERNEL  ·  PACKAGES</text>

  <a xlink:href="https://github.com/qte77/claude-code-plugins">
    <title>claude-code-plugins — canonical kernel: rules, skills, plugins (the package source consumed by all repos)</title>
    <rect class="box" x="260" y="196" width="380" height="58" rx="5"/>
    <text class="box-title" x="450" y="215" text-anchor="middle">claude-code-plugins</text>
    <text class="box-desc" x="450" y="231" text-anchor="middle">the kernel  ·  rules  ·  skills  ·  plugins</text>
    <text class="box-note" x="450" y="245" text-anchor="middle">package source: distributed via marketplace</text>
  </a>

  <!-- Arrow KERNEL → MECHANISM -->
  <line class="arrow" x1="450" y1="264" x2="450" y2="288"/>

  <!-- ===== Band 3: TOOL · MECHANISM (polyforge + office-forge side-by-side) ===== -->
  <rect class="band-bg" x="10" y="290" width="880" height="92" rx="6"/>
  <text class="tier-label" x="20" y="305">TOOL  ·  MECHANISM</text>

  <a xlink:href="https://github.com/qte77/polyforge-orchestrator">
    <title>polyforge-orchestrator — DEV mechanism: cc-parallel.sh, context-hygiene.md, recipes</title>
    <rect class="box" x="80" y="314" width="380" height="58" rx="5"/>
    <text class="box-title" x="270" y="333" text-anchor="middle">polyforge-orchestrator</text>
    <text class="box-desc" x="270" y="349" text-anchor="middle">DEV  ·  cc-parallel.sh  ·  recipes</text>
    <text class="box-note" x="270" y="363" text-anchor="middle">mechanism for dev orchestration</text>
  </a>

  <a xlink:href="https://github.com/qte77/office-forge-orchestrator">
    <title>office-forge-orchestrator — OFFICE mechanism: doc-pipeline-engine, MCP, /loop</title>
    <rect class="box" x="480" y="314" width="380" height="58" rx="5"/>
    <text class="box-title" x="670" y="333" text-anchor="middle">office-forge-orchestrator</text>
    <text class="box-desc" x="670" y="349" text-anchor="middle">OFFICE  ·  doc-pipeline-engine</text>
    <text class="box-note" x="670" y="363" text-anchor="middle">mechanism for office orchestration</text>
  </a>

  <!-- Arrow MECHANISM → STATE -->
  <line class="arrow" x1="450" y1="382" x2="450" y2="406"/>

  <!-- ===== Band 4: STATE · TRACKING ===== -->
  <rect class="band-bg" x="10" y="408" width="880" height="92" rx="6"/>
  <text class="tier-label" x="20" y="423">STATE  ·  TRACKING</text>

  <a xlink:href="https://github.com/qte77/qte77/issues">
    <title>GitHub Issues — canonical task SOT (per polyforge ontology.json)</title>
    <rect class="box" x="40" y="432" width="200" height="58" rx="5"/>
    <text class="box-title" x="140" y="451" text-anchor="middle">GitHub Issues</text>
    <text class="box-desc" x="140" y="467" text-anchor="middle">canonical task SOT</text>
    <text class="box-note" x="140" y="481" text-anchor="middle">human + agent + GHA writers</text>
  </a>

  <a xlink:href="https://github.com/qte77/polyforge-orchestrator/blob/main/config/contributions.json">
    <title>contributions.json — polyforge cross-repo plan execution state (machine-written, --resume source)</title>
    <rect class="box" x="250" y="432" width="200" height="58" rx="5"/>
    <text class="box-title" x="350" y="451" text-anchor="middle">contributions.json</text>
    <text class="box-desc" x="350" y="467" text-anchor="middle">polyforge execution state</text>
    <text class="box-note" x="350" y="481" text-anchor="middle">cross-repo plan; survives rebuilds</text>
  </a>

  <a xlink:href="https://github.com/qte77/polyforge-orchestrator/blob/main/config/ontology.json">
    <title>ontology.json — entity model (12 types, 11 typed relationships) — defines storage/writers/readers</title>
    <rect class="box" x="460" y="432" width="200" height="58" rx="5"/>
    <text class="box-title" x="560" y="451" text-anchor="middle">ontology.json</text>
    <text class="box-desc" x="560" y="467" text-anchor="middle">entity model</text>
    <text class="box-note" x="560" y="481" text-anchor="middle">defines this very tier</text>
  </a>

  <a xlink:href="https://github.com/qte77/qte77/blob/main/goals.json">
    <title>goals.json — workspace OKRs / strategic goals (humans write; orchestrators read)</title>
    <rect class="box" x="670" y="432" width="200" height="58" rx="5"/>
    <text class="box-title" x="770" y="451" text-anchor="middle">goals.json</text>
    <text class="box-desc" x="770" y="467" text-anchor="middle">workspace OKRs</text>
    <text class="box-note" x="770" y="481" text-anchor="middle">humans set; agents read</text>
  </a>

  <!-- Arrow STATE → CONSUMERS -->
  <line class="arrow" x1="450" y1="500" x2="450" y2="524"/>

  <!-- ===== Band 5: CONSUMERS (siblings) ===== -->
  <rect class="band-bg" x="10" y="526" width="880" height="92" rx="6"/>
  <text class="tier-label" x="20" y="541">CONSUMERS</text>

  <a xlink:href="https://github.com/qte77">
    <title>30+ sibling repos — consume polyforge; inherit workspace policy; stay rules-light</title>
    <rect class="box" x="160" y="550" width="580" height="58" rx="5"/>
    <text class="box-title" x="450" y="569" text-anchor="middle">30+ sibling repos</text>
    <text class="box-desc" x="450" y="585" text-anchor="middle">Agents-eval  ·  ralph-loop  ·  ai-agents-research  ·  paperverse  ·  …</text>
    <text class="box-note" x="450" y="599" text-anchor="middle">operands: no new hygiene docs  ·  stay rules-light  ·  run under polyforge</text>
  </a>

  <!-- Footer -->
  <text class="note" x="20" y="638">policy ≠ mechanism ≠ operand  ·  each concern lives in exactly one tier</text>
  <text class="note" x="880" y="638" text-anchor="end">DRY across 30+ repos: one AGENTS.md rule  ·  one tool doc  ·  no sibling duplication</text>
</svg>
