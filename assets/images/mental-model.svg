<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 660" width="900" height="660">
  <defs>
    <style>
      .page-bg { fill: #ffffff; }
      .band-bg { fill: #f6f8fa; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .box-star { fill: #ffffff; stroke: #1f6feb; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; fill: #656d76; }
      .band-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #57606a; letter-spacing: 1.5px; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #1f2328; }
      .box-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; fill: #656d76; }
      .note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; fill: #8b949e; }
      .arrow { stroke: #b0b8c1; stroke-width: 1.4; fill: none; marker-end: url(#ah-l); }
      .arrow-feedback { stroke: #1f6feb; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; marker-end: url(#ah-blue-l); }

      a:hover .box { stroke: #1f2328; stroke-width: 1.5; }
      a:hover .box-star { stroke: #1f6feb; stroke-width: 2; }

      @media (prefers-color-scheme: dark) {
        .page-bg { fill: #0d1117; }
        .band-bg { fill: #161b22; }
        .box { fill: #0d1117; stroke: #30363d; }
        .box-star { fill: #0d1117; stroke: #388bfd; stroke-dasharray: 4 3; }
        .title { fill: #e6edf3; }
        .subtitle { fill: #8b949e; }
        .band-label { fill: #8b949e; }
        .box-title { fill: #e6edf3; }
        .box-desc { fill: #8b949e; }
        .note { fill: #484f58; }
        .arrow { stroke: #484f58; marker-end: url(#ah-d); }
        .arrow-feedback { stroke: #388bfd; marker-end: url(#ah-blue-d); }
        a:hover .box { stroke: #e6edf3; }
        a:hover .box-star { stroke: #388bfd; }
      }
    </style>
    <marker id="ah-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#b0b8c1" stroke-width="1"/>
    </marker>
    <marker id="ah-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#484f58" stroke-width="1"/>
    </marker>
    <marker id="ah-blue-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1f6feb" stroke-width="1"/>
    </marker>
    <marker id="ah-blue-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#388bfd" stroke-width="1"/>
    </marker>
  </defs>

  <rect class="page-bg" width="900" height="660" rx="8"/>

  <!-- Title + subtitle -->
  <text class="title" x="450" y="22" text-anchor="middle">qte77 — Mental Model</text>
  <text class="subtitle" x="450" y="38" text-anchor="middle">Goals flow down  ·  learnings flow back  ·  support band underneath</text>

  <!-- ===== NORTH STAR (dashed) ===== -->
  <a xlink:href="https://github.com/qte77/liminal-flux-gh-acc">
    <title>liminal-flux — self-evolving agent-operated GitHub account</title>
    <rect class="box-star" x="340" y="54" width="220" height="38" rx="5"/>
    <text class="box-title" x="450" y="70" text-anchor="middle">NORTH STAR</text>
    <text class="box-desc" x="450" y="84" text-anchor="middle">liminal-flux  ·  agent-operated account</text>
  </a>

  <line class="arrow" x1="450" y1="92" x2="450" y2="116"/>

  <!-- ===== SPECS (single item — no section-name repetition) ===== -->
  <rect class="band-bg" x="10" y="116" width="880" height="68" rx="6"/>
  <text class="band-label" x="20" y="131">SPECS</text>

  <a xlink:href="https://github.com/qte77/qte77/issues/50">
    <title>spec-forge — BRD → PRD → FRD spec generation</title>
    <rect class="box" x="330" y="136" width="240" height="40" rx="5"/>
    <text class="box-title" x="450" y="153" text-anchor="middle">spec-forge</text>
    <text class="box-desc" x="450" y="167" text-anchor="middle">BRD → PRD → FRD</text>
  </a>

  <line class="arrow" x1="450" y1="184" x2="450" y2="208"/>

  <!-- ===== ORCHESTRATE (DEV | OFFICE — prefixes kept, they distinguish) ===== -->
  <rect class="band-bg" x="10" y="208" width="880" height="78" rx="6"/>
  <text class="band-label" x="20" y="223">ORCHESTRATE</text>

  <a xlink:href="https://github.com/qte77/polyforge-orchestrator">
    <title>DEV orchestration: polyforge + ralph-loop + 2 ralphy offspring</title>
    <rect class="box" x="60" y="230" width="360" height="48" rx="5"/>
    <text class="box-title" x="240" y="249" text-anchor="middle">DEV  ·  polyforge</text>
    <text class="box-desc" x="240" y="264" text-anchor="middle">+ ralph-loop  ·  2 ralphy offspring</text>
  </a>

  <a xlink:href="https://github.com/qte77/office-forge-orchestrator">
    <title>OFFICE orchestration: office-forge-orchestrator + doc-pipeline-engine</title>
    <rect class="box" x="480" y="230" width="360" height="48" rx="5"/>
    <text class="box-title" x="660" y="249" text-anchor="middle">OFFICE  ·  office-forge</text>
    <text class="box-desc" x="660" y="264" text-anchor="middle">+ doc-pipeline-engine</text>
  </a>

  <!-- ===== IMPLEMENT & EVOLVE (single item) ===== -->
  <rect class="band-bg" x="10" y="306" width="880" height="64" rx="6"/>
  <text class="band-label" x="20" y="321">IMPLEMENT &amp; EVOLVE</text>

  <a xlink:href="https://github.com/qte77/ralph-loop-cc-tdd-wt-vibe-kanban-template">
    <title>ralph-loop + ralphy offspring — autonomous implementation with self-improve cycle</title>
    <rect class="box" x="290" y="326" width="320" height="36" rx="5"/>
    <text class="box-title" x="450" y="342" text-anchor="middle">ralph-loop  ·  ralphy offspring</text>
    <text class="box-desc" x="450" y="356" text-anchor="middle">self-improve cycle</text>
  </a>

  <path class="arrow" d="M 240,278 L 240,298 L 370,298 L 370,326"/>
  <path class="arrow" d="M 660,278 L 660,298 L 530,298 L 530,326"/>

  <line class="arrow" x1="450" y1="370" x2="450" y2="392"/>

  <!-- ===== EVALUATE (single item — no section-name repetition) ===== -->
  <rect class="band-bg" x="10" y="392" width="880" height="64" rx="6"/>
  <text class="band-label" x="20" y="407">EVALUATE</text>

  <a xlink:href="https://github.com/qte77/Agents-eval">
    <title>Agents-eval flagship + 4 siblings + 1 external (pat-tax)</title>
    <rect class="box" x="290" y="412" width="320" height="36" rx="5"/>
    <text class="box-title" x="450" y="428" text-anchor="middle">Agents-eval</text>
    <text class="box-desc" x="450" y="442" text-anchor="middle">+ 4 siblings  ·  1 external</text>
  </a>

  <line class="arrow" x1="450" y1="456" x2="450" y2="478"/>

  <!-- ===== LEARN (2 items — ai-agents-research + paperverse cluster) ===== -->
  <rect class="band-bg" x="10" y="478" width="880" height="78" rx="6"/>
  <text class="band-label" x="20" y="493">LEARN</text>

  <a xlink:href="https://github.com/qte77/ai-agents-research">
    <title>ai-agents-research — compound learnings hub (distills patterns, feeds back to SPECS)</title>
    <rect class="box" x="60" y="500" width="360" height="48" rx="5"/>
    <text class="box-title" x="240" y="519" text-anchor="middle">ai-agents-research</text>
    <text class="box-desc" x="240" y="534" text-anchor="middle">compound learnings hub</text>
  </a>

  <a xlink:href="https://github.com/qte77/paperverse">
    <title>paperverse — 3D paperscape viz, plus arxiv/biorxiv helper GHAs</title>
    <rect class="box" x="480" y="500" width="360" height="48" rx="5"/>
    <text class="box-title" x="660" y="519" text-anchor="middle">paperverse</text>
    <text class="box-desc" x="660" y="534" text-anchor="middle">+ arxiv-stats  ·  biorxiv-stats</text>
  </a>

  <!-- ===== SUPPORT (3 items — prefixes kept, they distinguish) ===== -->
  <rect class="band-bg" x="10" y="568" width="880" height="78" rx="6"/>
  <text class="band-label" x="20" y="583">SUPPORT  ·  substrate underneath all flows above</text>

  <a xlink:href="https://github.com/qte77/qte77/blob/main/assets/images/pipeline-layers.svg">
    <title>13 GitHub Actions forming the 6-layer pipeline — see pipeline-layers.svg</title>
    <rect class="box" x="30" y="590" width="260" height="48" rx="5"/>
    <text class="box-title" x="160" y="609" text-anchor="middle">AUTOMATE  ·  13 GHAs</text>
    <text class="box-desc" x="160" y="624" text-anchor="middle">6-layer pipeline → pipeline-layers.svg</text>
  </a>

  <a xlink:href="https://github.com/qte77/claude-code-plugins">
    <title>Infrastructure: dotfiles, cc-plugins, cc-recursive-team, eyerest-theme, diagramforge, polyfetch-scrape</title>
    <rect class="box" x="315" y="590" width="260" height="48" rx="5"/>
    <text class="box-title" x="445" y="609" text-anchor="middle">INFRASTRUCTURE  ·  6 repos</text>
    <text class="box-desc" x="445" y="624" text-anchor="middle">dotfiles  ·  claude-code-plugins  ·  diagramforge  ·  …</text>
  </a>

  <a xlink:href="https://github.com/qte77/agenthud-agui-a2ui">
    <title>Interfaces: agenthud-agui-a2ui, cc-voice-plugin, so101-biolab</title>
    <rect class="box" x="600" y="590" width="260" height="48" rx="5"/>
    <text class="box-title" x="730" y="609" text-anchor="middle">INTERFACES  ·  UI · Voice · Robot</text>
    <text class="box-desc" x="730" y="624" text-anchor="middle">agenthud  ·  cc-voice  ·  so101-biolab</text>
  </a>

  <!-- ===== Feedback loop: LEARN → SPECS (blue dashed, right side) ===== -->
  <path class="arrow-feedback" d="M 870,524 L 870,156 L 570,156"/>
</svg>
