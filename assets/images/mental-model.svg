<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 720" width="900" height="720">
  <defs>
    <style>
      .page-bg { fill: #ffffff; }
      .band-bg { fill: #f6f8fa; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .box-star { fill: #ffffff; stroke: #1f6feb; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #1f2328; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; fill: #656d76; }
      .band-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 600; fill: #57606a; letter-spacing: 1.5px; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #1f2328; }
      .box-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; fill: #656d76; }
      .note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 9px; fill: #8b949e; }
      .arrow { stroke: #b0b8c1; stroke-width: 1.4; fill: none; marker-end: url(#ah-l); }
      .arrow-feedback { stroke: #1f6feb; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; marker-end: url(#ah-blue-l); }

      a:hover .box { stroke: #1f2328; stroke-width: 1.5; }
      a:hover .box-star { stroke: #1f6feb; stroke-width: 2; }

      @media (prefers-color-scheme: dark) {
        .page-bg { fill: #0d1117; }
        .band-bg { fill: #161b22; }
        .box { fill: #0d1117; stroke: #30363d; }
        .box-star { fill: #0d1117; stroke: #388bfd; stroke-dasharray: 4 3; }
        .title { fill: #e6edf3; }
        .subtitle { fill: #8b949e; }
        .band-label { fill: #8b949e; }
        .box-title { fill: #e6edf3; }
        .box-desc { fill: #8b949e; }
        .note { fill: #484f58; }
        .arrow { stroke: #484f58; marker-end: url(#ah-d); }
        .arrow-feedback { stroke: #388bfd; marker-end: url(#ah-blue-d); }
        a:hover .box { stroke: #e6edf3; }
        a:hover .box-star { stroke: #388bfd; }
      }
    </style>
    <marker id="ah-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#b0b8c1" stroke-width="1"/>
    </marker>
    <marker id="ah-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#484f58" stroke-width="1"/>
    </marker>
    <marker id="ah-blue-l" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1f6feb" stroke-width="1"/>
    </marker>
    <marker id="ah-blue-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#388bfd" stroke-width="1"/>
    </marker>
  </defs>

  <rect class="page-bg" width="900" height="720" rx="8"/>

  <!-- Title + subtitle -->
  <text class="title" x="450" y="22" text-anchor="middle">qte77 — Mental Model</text>
  <text class="subtitle" x="450" y="38" text-anchor="middle">Goals flow down  ·  learnings flow back  ·  discoveries feed in  ·  support underneath</text>

  <!-- ===== NORTH STAR (dashed, top center) ===== -->
  <a xlink:href="https://github.com/qte77/liminal-flux-gh-acc">
    <title>liminal-flux — self-evolving agent-operated GitHub account (directional goal)</title>
    <rect class="box-star" x="340" y="54" width="220" height="38" rx="5"/>
    <text class="box-title" x="450" y="70" text-anchor="middle">NORTH STAR</text>
    <text class="box-desc" x="450" y="84" text-anchor="middle">liminal-flux  ·  agent-operated account</text>
  </a>

  <!-- Arrow: NORTH STAR → SPECS -->
  <line class="arrow" x1="450" y1="92" x2="450" y2="118"/>

  <!-- ===== SPECS + DISCOVER (paper feeds in from left) ===== -->
  <rect class="band-bg" x="10" y="118" width="880" height="74" rx="6"/>
  <text class="band-label" x="20" y="133">DISCOVER  ·  SPECS</text>

  <a xlink:href="https://github.com/qte77/paperverse">
    <title>Paper research: paperverse + arxiv/biorxiv helper GHAs (feeds discoveries into specs)</title>
    <rect class="box" x="30" y="140" width="280" height="44" rx="5"/>
    <text class="box-title" x="170" y="158" text-anchor="middle">DISCOVER  ·  paperverse</text>
    <text class="box-desc" x="170" y="172" text-anchor="middle">+ arxiv-stats  ·  biorxiv-stats</text>
  </a>

  <a xlink:href="https://github.com/qte77/RAPID-spec-forge">
    <title>RAPID-spec-forge — BRD → PRD → FRD spec generation</title>
    <rect class="box" x="380" y="140" width="280" height="44" rx="5"/>
    <text class="box-title" x="520" y="158" text-anchor="middle">SPECS  ·  RAPID-spec-forge</text>
    <text class="box-desc" x="520" y="172" text-anchor="middle">BRD → PRD → FRD</text>
  </a>

  <!-- Arrow: DISCOVER → SPECS (horizontal) -->
  <line class="arrow" x1="310" y1="162" x2="380" y2="162"/>

  <!-- Arrow: SPECS → ORCHESTRATE -->
  <line class="arrow" x1="520" y1="184" x2="520" y2="214"/>

  <!-- ===== ORCHESTRATE (DEV | OFFICE) ===== -->
  <rect class="band-bg" x="10" y="214" width="880" height="78" rx="6"/>
  <text class="band-label" x="20" y="229">ORCHESTRATE</text>

  <a xlink:href="https://github.com/qte77/polyforge-orchestrator">
    <title>DEV orchestration: polyforge + ralph-loop + 2 ralphy offspring</title>
    <rect class="box" x="60" y="236" width="360" height="48" rx="5"/>
    <text class="box-title" x="240" y="255" text-anchor="middle">DEV  ·  polyforge</text>
    <text class="box-desc" x="240" y="270" text-anchor="middle">+ ralph-loop  ·  2 ralphy offspring</text>
  </a>

  <a xlink:href="https://github.com/qte77/office-forge-orchestrator">
    <title>OFFICE orchestration: office-forge-orchestrator + doc-pipeline-engine</title>
    <rect class="box" x="480" y="236" width="360" height="48" rx="5"/>
    <text class="box-title" x="660" y="255" text-anchor="middle">OFFICE  ·  office-forge</text>
    <text class="box-desc" x="660" y="270" text-anchor="middle">+ doc-pipeline-engine</text>
  </a>

  <!-- Arrows from SPECS split to DEV + OFFICE -->
  <path class="arrow" d="M 520,214 L 520,208 L 240,208 L 240,236"/>
  <path class="arrow" d="M 520,214 L 520,208 L 660,208 L 660,236"/>

  <!-- ===== IMPLEMENT & EVOLVE ===== -->
  <rect class="band-bg" x="10" y="312" width="880" height="64" rx="6"/>
  <text class="band-label" x="20" y="327">IMPLEMENT &amp; EVOLVE</text>

  <a xlink:href="https://github.com/qte77/ralph-loop-cc-tdd-wt-vibe-kanban-template">
    <title>ralph-loop + ralphy offspring — autonomous implementation</title>
    <rect class="box" x="290" y="332" width="320" height="36" rx="5"/>
    <text class="box-title" x="450" y="348" text-anchor="middle">IMPLEMENT &amp; EVOLVE</text>
    <text class="box-desc" x="450" y="362" text-anchor="middle">ralph-loop  ·  ralphy offspring  ·  self-improve cycle</text>
  </a>

  <!-- Arrows DEV/OFFICE → IMPLEMENT -->
  <path class="arrow" d="M 240,284 L 240,306 L 370,306 L 370,332"/>
  <path class="arrow" d="M 660,284 L 660,306 L 530,306 L 530,332"/>

  <!-- ===== EVALUATE ===== -->
  <rect class="band-bg" x="10" y="394" width="880" height="64" rx="6"/>
  <text class="band-label" x="20" y="409">EVALUATE</text>

  <a xlink:href="https://github.com/qte77/Agents-eval">
    <title>Evaluation: Agents-eval flagship + 4 siblings + 1 external (pat-tax)</title>
    <rect class="box" x="290" y="414" width="320" height="36" rx="5"/>
    <text class="box-title" x="450" y="430" text-anchor="middle">EVALUATE  ·  Agents-eval</text>
    <text class="box-desc" x="450" y="444" text-anchor="middle">+ 4 siblings  ·  1 external</text>
  </a>

  <!-- Arrow IMPLEMENT → EVALUATE -->
  <line class="arrow" x1="450" y1="376" x2="450" y2="414"/>

  <!-- ===== LEARN (ai-agents-research) ===== -->
  <rect class="band-bg" x="10" y="476" width="880" height="64" rx="6"/>
  <text class="band-label" x="20" y="491">LEARN</text>

  <a xlink:href="https://github.com/qte77/ai-agents-research">
    <title>ai-agents-research — compound learnings hub (distills patterns, feeds back to SPECS)</title>
    <rect class="box" x="290" y="496" width="320" height="36" rx="5"/>
    <text class="box-title" x="450" y="512" text-anchor="middle">LEARN  ·  ai-agents-research</text>
    <text class="box-desc" x="450" y="526" text-anchor="middle">compound learnings hub</text>
  </a>

  <!-- Arrow EVALUATE → LEARN -->
  <line class="arrow" x1="450" y1="458" x2="450" y2="496"/>

  <!-- ===== SUPPORT (AUTOMATE | INFRASTRUCTURE | INTERFACES) ===== -->
  <rect class="band-bg" x="10" y="558" width="880" height="78" rx="6"/>
  <text class="band-label" x="20" y="573">SUPPORT  ·  substrate underneath all flows above</text>

  <a xlink:href="https://github.com/qte77/qte77/blob/main/assets/images/pipeline-layers.svg">
    <title>13 GitHub Actions forming the 6-layer pipeline — see pipeline-layers.svg</title>
    <rect class="box" x="30" y="580" width="260" height="48" rx="5"/>
    <text class="box-title" x="160" y="599" text-anchor="middle">AUTOMATE  ·  13 GHAs</text>
    <text class="box-desc" x="160" y="614" text-anchor="middle">6-layer pipeline → pipeline-layers.svg</text>
  </a>

  <a xlink:href="https://github.com/qte77/claude-code-plugins">
    <title>Infrastructure: dotfiles, cc-plugins, cc-recursive-team, eyerest-theme, diagramforge, polyfetch-scrape</title>
    <rect class="box" x="315" y="580" width="260" height="48" rx="5"/>
    <text class="box-title" x="445" y="599" text-anchor="middle">INFRASTRUCTURE  ·  6 repos</text>
    <text class="box-desc" x="445" y="614" text-anchor="middle">dotfiles  ·  cc-plugins  ·  diagramforge  ·  …</text>
  </a>

  <a xlink:href="https://github.com/qte77/agenthud-agui-a2ui">
    <title>Interfaces: agenthud-agui-a2ui, cc-voice-plugin, so101-biolab</title>
    <rect class="box" x="600" y="580" width="260" height="48" rx="5"/>
    <text class="box-title" x="730" y="599" text-anchor="middle">INTERFACES  ·  UI · Voice · Robot</text>
    <text class="box-desc" x="730" y="614" text-anchor="middle">agenthud  ·  cc-voice  ·  so101-biolab</text>
  </a>

  <!-- ===== Feedback loop: LEARN → SPECS (blue dashed, right side) ===== -->
  <path class="arrow-feedback" d="M 870,514 L 870,160 L 660,160"/>

  <!-- Footer -->
  <text class="note" x="20" y="660">— gray arrows: goals flow down (NORTH STAR → SPECS → ORCHESTRATE → IMPLEMENT → EVALUATE → LEARN)</text>
  <text class="note" x="20" y="675">— DISCOVER feeds SPECS (paper research as input, not output)</text>
  <text class="note" x="20" y="690">— blue dashed: feedback loop — learnings flow back to SPECS for the next cycle</text>
  <text class="note" x="20" y="705">— SUPPORT band underneath everything (shared substrate for all flows above)</text>
</svg>
